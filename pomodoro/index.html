<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Timer</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center">

    <div class="nuvens-container">
        <div class="nuvem n1">☁️</div>
        <div class="nuvem n2">☁️</div>
        <div class="nuvem n3">☁️</div>
        <div class="nuvem n4">☁️</div>
        <div class="nuvem n5">☁️</div>
        <div class="nuvem n6">☁️</div>
        <div class="nuvem n7">☁️</div>
    </div>

    <div id="screen-time" class="card-window relative z-10">
        <div class="card-header">
            <span class="dot dot-r"></span>
            <span class="dot dot-y"></span>
            <span class="dot dot-g"></span>
            <span class="text-white text-sm font-bold ml-2">Egg Timer</span>
        </div>
        <div class="p-5 flex flex-col items-center gap-4">
            <p class="text-center font-medium text-purple-900">Escolha o tempo de foco:</p>
            <div class="grid grid-cols-3 gap-3 w-full">
                
                <button class="time-option" onclick="selectTime(25)">
                    <img src="imagens/relogio1.png" alt="Clock icon representing a 25 minute focus interval in the purple themed egg timer selection screen" class="icone-relogio">
                    <span class="text-xs font-bold block text-purple-700">25 Min</span>
                </button>
                
                <button class="time-option" onclick="selectTime(15)">
                    <img src="imagens/relogio2.png" alt="Clock icon representing a 15 minute focus interval in the purple themed egg timer selection screen" class="icone-relogio">
                    <span class="text-xs font-bold block text-purple-700">15 Min</span>
                </button>
                
                <button class="time-option" onclick="selectTime(5)">
                    <img src="imagens/relogio3.png" alt="Clock icon representing a 5 minute focus interval in the purple themed egg timer selection screen" class="icone-relogio">
                    <span class="text-xs font-bold block text-purple-700">5 Min</span>
                </button>
                
            </div>
        </div>
    </div>

    <div id="screen-egg" class="card-window relative z-10 hidden">
        <div class="card-header">
            <span class="dot dot-r"></span>
            <span class="dot dot-y"></span>
            <span class="dot dot-g"></span>
            <span class="text-white text-sm font-bold ml-2">Escolha seu Mascote</span>
        </div>
        <div class="p-5 flex flex-col items-center gap-4">
            <p class="text-center font-medium text-purple-900">Como você quer o seu ovo?</p>
            <div class="grid grid-cols-2 gap-4 w-full">
                <button class="time-option" onclick="selectEgg('🍳')">
                    <div class="kawaii-face mb-1">🍳</div>
                    <span class="text-xs font-bold block text-purple-700">Ovo Frito</span>
                </button>
                <button class="time-option" onclick="selectEgg('🐣')">
                    <div class="kawaii-face mb-1">🐣</div>
                    <span class="text-xs font-bold block text-purple-700">Chocando</span>
                </button>
            </div>
        </div>
    </div>

    <div id="screen-timer" class="card-window relative z-10 hidden">
        <div class="card-header">
            <span class="dot dot-r"></span>
            <span class="dot dot-y"></span>
            <span class="dot dot-g"></span>
            <span class="text-white text-sm font-bold ml-2">Contagem Regressiva</span>
        </div>
        <div class="p-6 flex flex-col items-center gap-4">
            <p class="font-medium text-center text-purple-900">Mantenha o foco!</p>
            <div class="kawaii-face bounce" id="timer-egg">🥚</div>
            <div class="timer-display" id="time-display">25:00</div>
            <div class="flex gap-3">
                <button class="btn-action" id="start-btn" onclick="toggleTimer()">INICIAR</button>
                <button class="btn-secondary" onclick="restart()">REINICIAR</button>
            </div>
        </div>
    </div>

    <div id="screen-done" class="card-window relative z-10 hidden">
        <div class="card-header">
            <span class="dot dot-r"></span>
            <span class="dot dot-y"></span>
            <span class="dot dot-g"></span>
            <span class="text-white text-sm font-bold ml-2">Parabéns!</span>
        </div>
        <div class="p-6 flex flex-col items-center gap-4">
            <p class="font-bold text-center text-lg text-purple-900">Tempo concluído!</p>
            <div class="kawaii-face bounce">🎉</div>
            <div class="flex gap-3">
                <button class="btn-secondary" onclick="snooze()">SONECA (+1 min)</button>
                <button class="btn-action" onclick="restart()">FECHAR</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
